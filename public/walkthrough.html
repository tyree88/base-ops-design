<!-- ============ primitives: reveal + nav + chips + tiles ============ -->
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useReducedMotion() {
  const [reduced, setReduced] = useState(
    () => typeof matchMedia !== "undefined" && matchMedia("(prefers-reduced-motion: reduce)").matches
  );
  useEffect(() => {
    const mq = matchMedia("(prefers-reduced-motion: reduce)");
    const on = () => setReduced(mq.matches);
    mq.addEventListener?.("change", on);
    return () => mq.removeEventListener?.("change", on);
  }, []);
  return reduced;
}

function Reveal({ children, delay = 0, y = 16, as = "div", style, ...rest }) {
  const reduced = useReducedMotion();
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (reduced) { setShown(true); return; }
    const el = ref.current;
    if (!el) return;
    let done = false;
    const check = () => {
      if (done || !ref.current) return;
      const r = ref.current.getBoundingClientRect();
      const vh = window.innerHeight || document.documentElement.clientHeight;
      if (r.top < vh * 0.9 && r.bottom > 0) { done = true; setShown(true); cleanup(); }
    };
    const cleanup = () => {
      window.removeEventListener("scroll", check);
      window.removeEventListener("resize", check);
    };
    window.addEventListener("scroll", check, { passive: true });
    window.addEventListener("resize", check);
    check();
    const raf = requestAnimationFrame(check);
    return () => { cleanup(); cancelAnimationFrame(raf); };
  }, [reduced]);
  const Tag = as;
  return (
    <Tag ref={ref} style={{
      opacity: shown ? 1 : 0,
      transform: shown ? "none" : `translateY(${y}px)`,
      transition: reduced ? "none" : `opacity .6s cubic-bezier(.22,1,.36,1) ${delay}s, transform .6s cubic-bezier(.22,1,.36,1) ${delay}s`,
      ...style,
    }} {...rest}>{children}</Tag>
  );
}

function Eyebrow({ children, tone = "accent", style }) {
  return <div style={{
    fontFamily: T.sans, fontSize: 13, fontWeight: 700, letterSpacing: "0.16em",
    textTransform: "uppercase", color: tone === "muted" ? T.muted : T.accent, ...style,
  }}>{children}</div>;
}

function Badge({ children, tone = "neutral", uppercase, style }) {
  const map = {
    neutral: { fg: T.ink, bg: T.soft, bd: T.line },
    muted: { fg: T.muted, bg: "transparent", bd: T.line },
    accent: { fg: T.accent, bg: T.tint.producer, bd: "transparent" },
    amber: { fg: T.amber, bg: T.tint.amber, bd: "transparent" },
    green: { fg: T.green, bg: T.tint.finance, bd: "transparent" },
  }[tone] || {};
  return <span style={{
    display: "inline-flex", alignItems: "center", fontFamily: T.sans, fontSize: 11.5, fontWeight: 700,
    letterSpacing: uppercase ? "0.08em" : "0.01em", textTransform: uppercase ? "uppercase" : "none",
    lineHeight: 1, padding: "4px 9px", borderRadius: 999, color: map.fg, background: map.bg,
    border: `1px solid ${map.bd}`, whiteSpace: "nowrap", ...style,
  }}>{children}</span>;
}

function RoleChip({ role = "producer", label, variant = "soft", style }) {
  const solid = T.role[role], tint = T.tint[role];
  const filled = variant === "filled";
  const names = { partnerships: "Partnerships", producer: "Producer", host: "On-site Host", finance: "Finance", cityManager: "City Manager" };
  return <span style={{
    display: "inline-flex", alignItems: "center", gap: 7, fontFamily: T.sans, fontSize: 13, fontWeight: 600,
    lineHeight: 1, padding: "5px 11px", borderRadius: 999, color: filled ? T.onRole : solid,
    background: filled ? solid : tint, border: filled ? "none" : `1px solid ${solid}`, ...style,
  }}>
    <span style={{ width: 7, height: 7, borderRadius: "50%", background: filled ? T.onRole : solid, opacity: filled ? .9 : 1 }} />
    {label || names[role]}
  </span>;
}

function EntityChip({ label, stableKey, atom, style }) {
  return <span style={{
    display: "inline-flex", alignItems: "center", gap: 8, padding: atom ? "9px 15px" : "6px 12px",
    borderRadius: 10, background: atom ? T.accent : "transparent", border: atom ? "none" : `1px solid ${T.ink}`,
    color: atom ? T.onRole : T.ink, fontFamily: T.sans, fontWeight: atom ? 700 : 600, fontSize: atom ? 16 : 14, ...style,
  }}>
    {label}
    {stableKey && <code style={{
      fontFamily: T.mono, fontSize: atom ? 12.5 : 11.5, fontWeight: 400, padding: "2px 6px", borderRadius: 3,
      background: atom ? "rgba(255,255,255,.18)" : T.soft, color: atom ? "rgba(255,255,255,.92)" : T.muted,
    }}>{stableKey}</code>}
  </span>;
}

function StatTile({ label, value, unit = "", target, trend, emphasis, below }) {
  const reduced = useReducedMotion();
  const ref = useRef(null);
  const [n, setN] = useState(reduced ? value : 0);
  useEffect(() => {
    if (reduced) { setN(value); return; }
    const el = ref.current; if (!el) return;
    let raf, started = false;
    const io = new IntersectionObserver((es) => es.forEach((e) => {
      if (e.isIntersecting && !started) {
        started = true; const t0 = performance.now(), dur = 1100;
        const tick = (t) => { const p = Math.min(1, (t - t0) / dur); const e2 = 1 - Math.pow(1 - p, 3);
          setN(value * e2); if (p < 1) raf = requestAnimationFrame(tick); };
        raf = requestAnimationFrame(tick); io.disconnect();
      }
    }), { threshold: 0.4 });
    io.observe(el);
    return () => { io.disconnect(); cancelAnimationFrame(raf); };
  }, [reduced, value]);
  const isInt = Number.isInteger(value);
  const disp = isInt ? Math.round(n) : n.toFixed(1);
  const up = trend && trend.trim().startsWith("+"), down = trend && trend.trim().startsWith("-");
  return <div ref={ref} style={{
    background: T.navy, border: `1px solid ${emphasis ? T.accent : T.line}`, borderRadius: 14,
    padding: "18px 20px", boxShadow: emphasis ? "0 0 0 1px rgba(191,52,78,0.25)" : "none",
  }}>
    <div style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600, color: T.muted, lineHeight: 1.3, minHeight: 34 }}>{label}</div>
    <div style={{ display: "flex", alignItems: "baseline", gap: 3, marginTop: 10 }}>
      <span style={{ fontFamily: T.serif, fontSize: 38, fontWeight: 700, letterSpacing: "-0.02em", color: emphasis ? T.accent : T.ink, lineHeight: 1 }}>{disp}</span>
      {unit && <span style={{ fontFamily: T.serif, fontSize: 22, color: T.muted }}>{unit}</span>}
    </div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12, gap: 8 }}>
      <span style={{ fontFamily: T.mono, fontSize: 11.5, color: below ? T.amber : T.muted }}>{target}{below ? " · below" : ""}</span>
      {trend && <span style={{ fontFamily: T.sans, fontSize: 12, fontWeight: 600, color: below ? T.amber : up ? T.green : down ? T.accent : T.muted }}>{trend}</span>}
    </div>
  </div>;
}

function Callout({ children, tone = "accent", chip, style }) {
  const tones = {
    accent: { c: T.accent, t: T.tint.producer }, assumption: { c: T.muted, t: T.soft },
    amber: { c: T.amber, t: T.tint.amber }, green: { c: T.green, t: T.tint.finance },
  }[tone];
  return <aside style={{
    borderLeft: `3px solid ${tones.c}`, background: tones.t, borderRadius: 6, padding: "16px 20px",
    color: tone === "assumption" ? T.muted : T.body, fontFamily: T.sans,
    fontSize: tone === "assumption" ? 14 : 16, lineHeight: 1.5, ...style,
  }}>
    {chip && <span style={{ display: "inline-block", fontFamily: T.sans, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: tones.c, marginBottom: 8 }}>{chip}</span>}
    <div>{children}</div>
  </aside>;
}

function DotNav({ sections, active, onJump }) {
  return <nav aria-label="Sections" style={{
    position: "fixed", right: 22, top: "50%", transform: "translateY(-50%)", zIndex: 40,
    display: "flex", flexDirection: "column", gap: 14,
  }} className="dotnav">
    {sections.map((s, i) => (
      <button key={s.id} onClick={() => onJump(s.id)} title={s.label} aria-label={s.label}
        style={{ display: "flex", alignItems: "center", gap: 10, background: "none", border: 0, cursor: "pointer", padding: 0, flexDirection: "row-reverse" }}>
        <span style={{
          width: active === i ? 11 : 8, height: active === i ? 11 : 8, borderRadius: "50%",
          background: active === i ? T.accent : "transparent", border: `1.5px solid ${active === i ? T.accent : T.muted}`,
          transition: "all .25s ease", display: "block",
        }} />
        <span style={{
          fontFamily: T.sans, fontSize: 11, fontWeight: 600, color: T.muted, whiteSpace: "nowrap",
          opacity: active === i ? 1 : 0, transform: active === i ? "none" : "translateX(6px)", transition: "all .25s ease",
        }}>{s.label}</span>
      </button>
    ))}
  </nav>;
}

Object.assign(window, { useReducedMotion, Reveal, Eyebrow, Badge, RoleChip, EntityChip, StatTile, Callout, DotNav });
</script>

<script type="text/babel">
const { useState: useStateLC, useMemo } = React;

const LC = { LABEL_W: 138, COL_W: 116, NW: 100, NH: 46, HEADER_H: 30, LANE_H: 78 };

function Lifecycle() {
  const reduced = useReducedMotion();
  const [step, setStep] = useStateLC(4);
  const activeIndex = step - 1;
  const W = LC.LABEL_W + STATES.length * LC.COL_W;
  const H = LC.HEADER_H + LANES.length * LC.LANE_H;

  const laneY = (laneKey) => {
    const L = LANES.findIndex((l) => l.key === laneKey);
    return LC.HEADER_H + L * LC.LANE_H + LC.LANE_H / 2;
  };
  const nodeX = (i) => LC.LABEL_W + i * LC.COL_W + LC.COL_W / 2;

  const nodes = useMemo(() => STATES.map((s, i) => ({
    ...s, i, x: nodeX(i), y: laneY(s.lane), color: T.role[s.lane],
  })), []);

  const active = STATES[activeIndex];

  const edgePath = (a, b) => {
    const x1 = a.x + LC.NW / 2, x2 = b.x - LC.NW / 2;
    const mx = (x1 + x2) / 2;
    if (a.y === b.y) return `M ${x1} ${a.y} L ${x2} ${b.y}`;
    return `M ${x1} ${a.y} L ${mx} ${a.y} L ${mx} ${b.y} L ${x2} ${b.y}`;
  };

  return (
    <div>
      <div style={{ background: T.navy, color: T.ink, borderRadius: 12, padding: "16px 22px", marginBottom: 22, border: `1px solid ${T.line}` }}>
        <div style={{ fontFamily: T.serif, fontSize: 22, fontWeight: 400, letterSpacing: "0.02em", lineHeight: 1.3, textTransform: "uppercase" }}>
          a hand-off = a change in stage + a required pack of information + a named owner + a due date
        </div>
        <div style={{ fontFamily: T.sans, fontSize: 13, color: T.muted, marginTop: 6 }}>
          exactly one accountable owner per stage — each with a named successor (escalation to the City Manager), so no event is orphaned when an owner is out.
        </div>
      </div>

      <div style={{ overflowX: "auto", paddingBottom: 4 }}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ minWidth: 880, display: "block" }} role="img"
          aria-label="Gated event lifecycle swimlane">
          <defs>
            <marker id="lc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill={T.muted} />
            </marker>
            <marker id="lc-arrow-gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill={T.role.cityManager} />
            </marker>
          </defs>

          {LANES.map((l, idx) => {
            const y = LC.HEADER_H + idx * LC.LANE_H;
            return (
              <g key={l.key}>
                <rect x="0" y={y} width={W} height={LC.LANE_H} fill={idx % 2 ? "transparent" : "rgba(0,0,0,0.012)"} />
                <rect x="0" y={y} width={LC.LABEL_W} height={LC.LANE_H} fill={T.tint[l.key]} opacity="0.5" />
                <rect x={LC.LABEL_W - 3} y={y + 10} width="3" height={LC.LANE_H - 20} rx="1.5" fill={T.role[l.key]} />
                <text x="18" y={y + LC.LANE_H / 2} dominantBaseline="middle" fill={T.role[l.key]}
                  style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 700 }}>{l.label}</text>
                <line x1="0" y1={y} x2={W} y2={y} stroke={T.line} strokeWidth="1" />
              </g>
            );
          })}
          <text x="18" y={LC.HEADER_H / 2 + 2} dominantBaseline="middle" fill={T.muted}
            style={{ fontFamily: T.sans, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.1em" }}>OWNER ↓ / STAGES →</text>

          {nodes.slice(0, -1).map((a, i) => {
            const b = nodes[i + 1];
            const isCheckpoint = b.hardCheckpoint;
            const isActiveEdge = (i + 1) === activeIndex;
            const d = edgePath(a, b);
            const stroke = isCheckpoint ? T.role.cityManager : (i + 1 <= activeIndex ? T.role[a.lane] : T.line);
            return (
              <g key={`e${i}`}>
                <path d={d} fill="none" stroke={stroke} strokeWidth={isCheckpoint ? 3.4 : 2}
                  markerEnd={isCheckpoint ? "url(#lc-arrow-gold)" : "url(#lc-arrow)"}
                  opacity={i + 1 <= activeIndex || isCheckpoint ? 1 : 0.5} />
                {isActiveEdge && !reduced && (
                  <path d={d} fill="none" stroke={isCheckpoint ? T.role.cityManager : T.accent} strokeWidth={isCheckpoint ? 3.4 : 2.4}
                    strokeDasharray="10 240" strokeLinecap="round">
                    <animate attributeName="stroke-dashoffset" from="250" to="0" dur="0.9s" repeatCount="indefinite" />
                  </path>
                )}
              </g>
            );
          })}

          {(() => {
            const cp = nodes.find((n) => n.hardCheckpoint);
            const prev = nodes[cp.i - 1];
            const mx = (prev.x + LC.NW / 2 + cp.x - LC.NW / 2) / 2;
            const topY = Math.min(prev.y, cp.y) - 18;
            return (
              <g>
                <rect x={mx - 7} y={Math.min(prev.y, cp.y) - 8} width="14" height={Math.abs(cp.y - prev.y) + 16} rx="3"
                  fill="none" stroke={T.role.cityManager} strokeWidth="2" opacity="0.65" />
                <text x={mx} y={topY - 6} textAnchor="middle" fill={T.role.cityManager}
                  style={{ fontFamily: T.sans, fontSize: 11.5, fontWeight: 700 }}>Booked is not Confirmed</text>
              </g>
            );
          })()}

          {nodes.map((n) => {
            const done = n.i < activeIndex;
            const isActive = n.i === activeIndex;
            const future = n.i > activeIndex;
            return (
              <g key={n.name} transform={`translate(${n.x - LC.NW / 2}, ${n.y - LC.NH / 2})`}
                style={{ transition: reduced ? "none" : "transform .35s cubic-bezier(.22,1,.36,1)" }}>
                <rect width={LC.NW} height={LC.NH} rx="9"
                  fill={future ? T.soft : n.color}
                  stroke={future ? n.color : (isActive ? T.ink : "none")}
                  strokeWidth={future ? 1.4 : (isActive ? 2 : 0)}
                  opacity={future ? 0.92 : 1}
                  style={{ filter: isActive && !reduced ? `drop-shadow(0 0 14px ${n.color})` : "none" }} />
                <text x={LC.NW / 2} y={LC.NH / 2} textAnchor="middle" dominantBaseline="middle"
                  fill={future ? n.color : T.onRole}
                  style={{ fontFamily: T.sans, fontSize: 12.5, fontWeight: 700 }}>{n.name}</text>
                {done && <circle cx={LC.NW - 11} cy={11} r="6" fill={T.onRole} />}
                {done && <path d={`M ${LC.NW - 14} 11 l 2.2 2.4 l 4-4.6`} fill="none" stroke={n.color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />}
              </g>
            );
          })}
        </svg>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16,
        padding: "12px 16px", background: T.soft, border: `1px solid ${T.line}`, borderRadius: 999, marginTop: 18 }}>
        <button type="button" onClick={() => setStep((s) => Math.max(1, s - 1))} disabled={step <= 1} style={stepBtn(step <= 1)}>← Back</button>
        <div style={{ textAlign: "center", lineHeight: 1.2 }}>
          <div style={{ fontFamily: T.mono, fontSize: 11, color: T.muted, letterSpacing: "0.04em" }}>Step {step} of {STATES.length}</div>
          <div style={{ fontFamily: T.sans, fontSize: 14, fontWeight: 700, color: T.ink }}>{active.name}</div>
        </div>
        <button type="button" onClick={() => setStep((s) => Math.min(STATES.length, s + 1))} disabled={step >= STATES.length} style={stepBtn(step >= STATES.length)}>Advance →</button>
      </div>

      <div style={{ marginTop: 16, background: T.navy, border: `1px solid ${active.hardCheckpoint ? T.role.cityManager : T.line}`,
        borderRadius: 12, padding: "18px 20px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
          <Eyebrow tone="muted">Entry gate → {active.name}</Eyebrow>
          <RoleChip role={active.lane} />
          {active.hardCheckpoint && <Badge tone="amber" uppercase>Hard checkpoint</Badge>}
        </div>
        <div style={{ fontFamily: T.sans, fontSize: 15.5, color: T.body, lineHeight: 1.5 }}>{active.gateIn}</div>
        <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
          <span style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600, color: T.muted }}>Deadline</span>
          <Badge tone="neutral">{active.sla}</Badge>
          <Badge tone="muted" uppercase>illustrative, to validate in discovery</Badge>
        </div>
        {active.hardCheckpoint && (
          <div style={{ marginTop: 12, fontFamily: T.sans, fontSize: 13.5, color: T.role.cityManager }}>
            <strong>Booked is not the same as Confirmed</strong> — a soft or verbal hold versus a signed agreement plus a host plus a ready run-of-show. This is where Base's confirmations fail today.
          </div>
        )}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 14, marginTop: 16 }}>
        {SIDE_STATES.map((s) => (
          <div key={s.name} style={{ background: T.soft, border: `1px dashed ${T.role[s.lane]}`, borderRadius: 12, padding: "14px 16px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
              <RoleChip role={s.lane} label={s.name} />
              <span style={{ fontFamily: T.mono, fontSize: 11, color: T.muted }}>
                {s.entersFrom} →{s.returnsTo ? ` re-enters ${s.returnsTo}` : " off-ramp"}
              </span>
            </div>
            <div style={{ fontFamily: T.sans, fontSize: 13, color: T.body, lineHeight: 1.45 }}>{s.gateIn}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function stepBtn(disabled) {
  return {
    fontFamily: T.sans, fontSize: 14, fontWeight: 600, padding: "9px 18px", borderRadius: 999,
    border: `1px solid ${T.line}`, background: disabled ? "transparent" : T.navy,
    color: disabled ? T.line : T.ink, cursor: disabled ? "default" : "pointer",
  };
}

Object.assign(window, { Lifecycle });
</script>

function BreakpointChart({ data }) {
  const W = 760, H = 270, padL = 48, padB = 52, padT = 48, padR = 30;
  const maxV = 360, n = data.length;
  const sx = (i) => padL + (i / (n - 1)) * (W - padL - padR);
  const sy = (v) => padT + (1 - v / maxV) * (H - padT - padB);
  const toPath = (key) => data.map((d, i) => `${i ? "L" : "M"} ${sx(i)} ${sy(d[key])}`).join(" ");
  const top = data.map((d, i) => `${i ? "L" : "M"} ${sx(i)} ${sy(d.manual)}`).join(" ");
  const bottom = data.map((_, i) => `L ${sx(n - 1 - i)} ${sy(data[n - 1 - i].structured)}`).join(" ");
  const gap = `${top} ${bottom} Z`;
  return (
    <div style={{ overflowX: "auto" }}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ minWidth: 600, display: "block" }} role="img"
        aria-label="Coordination effort: manual scales with volume while the structured curve flattens; the gap is the payoff">
        <g transform={`translate(${padL}, 10)`} style={{ fontFamily: T.sans, fontSize: 11, fontWeight: 600 }}>
          <line x1="0" y1="0" x2="20" y2="0" stroke={T.accent} strokeWidth="2.4" strokeDasharray="6 4" />

          <line x1="0" y1="16" x2="20" y2="16" stroke={T.amber} strokeWidth="2.6" />
          <text x="27" y="19.5" fill={T.muted}>with the structure — coordination flattens</text>
        </g>
        {[0, 120, 240, 360].map((g) => { const y = sy(g); return (
          <g key={g}><line x1={padL} y1={y} x2={W - padR} y2={y} stroke={T.line} strokeWidth="1" />
            <text x={padL - 8} y={y} textAnchor="end" dominantBaseline="middle" fill={T.muted} style={{ fontFamily: T.mono, fontSize: 10 }}>{g}</text></g>
        ); })}
        <path d={gap} fill={T.green} opacity="0.08" />
        <path d={toPath("manual")} fill="none" stroke={T.accent} strokeWidth="2.2" strokeDasharray="6 4" strokeLinecap="round" strokeLinejoin="round" />
        <path d={toPath("structured")} fill="none" stroke={T.amber} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round" />
        {data.map((d, i) => {
          const first = i === 0, last = i === n - 1;
          const anchor = first ? "start" : last ? "end" : "middle";
          return (
            <g key={d.vol}>
              <circle cx={sx(i)} cy={sy(d.manual)} r="3" fill={T.navy} stroke={T.accent} strokeWidth="2" />
              <circle cx={sx(i)} cy={sy(d.structured)} r={last ? 5 : 3.5} fill={last ? T.accent : T.navy} stroke={last ? T.accent : T.amber} strokeWidth="2" />
              <text x={sx(i)} y={H - padB + 16} textAnchor={anchor} fill={T.ink} style={{ fontFamily: T.sans, fontSize: 11, fontWeight: 700 }}>{d.vol}/mo</text>
              <text x={sx(i)} y={H - padB + 31} textAnchor={anchor} fill={T.muted} style={{ fontFamily: T.sans, fontSize: 9.5 }}>{d.note}</text>
            </g>
          );
        })}
        <text x="6" y={padT - 6} fill={T.muted} style={{ fontFamily: T.sans, fontSize: 9, fontWeight: 700, letterSpacing: "0.08em" }}>EFFORT (INDEX)</text>
      </svg>
    </div>
  );
}

function BarChart({ data }) {
  const max = Math.max(...data.map((d) => d.v));
  const W = 440, H = 200, padL = 56, padB = 26, padT = 10, padR = 10;
  const bw = (W - padL - padR) / data.length;
  const sy = (v) => padT + (1 - v / max) * (H - padT - padB);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ marginTop: 12 }} role="img" aria-label="Per-city event volume">
      {[0, 0.5, 1].map((g) => { const y = padT + (1 - g) * (H - padT - padB); return (

          <text x={padL - 8} y={y} textAnchor="end" dominantBaseline="middle" fill={T.muted} style={{ fontFamily: T.mono, fontSize: 10 }}>{Math.round(max * g)}</text></g>
      ); })}
      {data.map((d, i) => {
        const x = padL + i * bw + bw * 0.18, w = bw * 0.64, y = sy(d.v);
        return <g key={d.city}>
          <rect x={x} y={y} width={w} height={H - padB - y} rx="3" fill={T.role.partnerships} />

        </g>;
      })}
    </svg>
  );
}

function LineChart({ data, healthyMax }) {
  const W = 440, H = 200, padL = 40, padB = 26, padT = 12, padR = 12;

  const sx = (i) => padL + (i / (data.length - 1)) * (W - padL - padR);

  const path = data.map((d, i) => `${i ? "L" : "M"} ${sx(i)} ${sy(d.rate)}`).join(" ");
  const area = `${path} L ${sx(data.length - 1)} ${H - padB} L ${sx(0)} ${H - padB} Z`;

    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ marginTop: 12 }} role="img" aria-label="Override rate trend">
      <line x1={padL} y1={sy(healthyMax)} x2={W - padR} y2={sy(healthyMax)} stroke={T.accent} strokeWidth="1.4" strokeDasharray="5 4" />

<!-- ============ App: section spine + scroll progress + dot rail ============ -->
<script type="text/babel">
const SECTIONS = [
  { id: "hero", label: "Base", Comp: Hero, hero: true },
  { id: "clock", label: "The Cost of Waiting", Comp: TheClock },
  { id: "phase0", label: "Phase 0 · Find & Agree", Comp: Phase0 },
  { id: "foundation", label: "Phase 1 · Foundation", Comp: Phase1Foundation },
  { id: "process", label: "Phase 2 · Process", Comp: Phase2Process },
  { id: "standardize", label: "Phase 3 · Standardize", Comp: Phase3Standardize },
  { id: "firstcity", label: "First City Live", Comp: FirstCityLive },
  { id: "automate", label: "Phase 4 · Automate", Comp: Phase4Automate },
  { id: "scaleout", label: "Phase 5 · Spread", Comp: Phase5ScaleOut },
  { id: "payoff", label: "The Payoff", Comp: PayoffAndAsk },
];

function LifecycleSection() {
  return (
    <div>
      <Reveal>
        <Eyebrow style={{ marginBottom: 14 }}>02 · System Design</Eyebrow>
        <h2 style={{ fontFamily: T.serif, fontSize: "clamp(28px,4vw,40px)", fontWeight: 400, letterSpacing: "0.03em", textTransform: "uppercase", color: T.ink, lineHeight: 1.12, maxWidth: "20ch" }}>
          How information moves — one record per fact, federated by domain and owned across roles.
        </h2>
        <p style={{ fontFamily: T.sans, fontSize: 18, lineHeight: 1.5, color: T.body, marginTop: 16, maxWidth: "62ch" }}>
          Each step is a checked hand-off. The event cannot move to the next stage until the required pack of information
          exists and a named owner accepts it — so missing or late information simply has no way to slip through.
        </p>
      </Reveal>
      <Reveal delay={0.06} style={{ marginTop: 30 }}><Lifecycle /></Reveal>
    </div>
  );
}

function App() {
  const [active, setActive] = React.useState(0);
  const [progress, setProgress] = React.useState(0);
  const refs = React.useRef([]);

  React.useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement;
      setProgress((h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100);
      const mid = window.scrollY + window.innerHeight * 0.4;
      let cur = 0;
      refs.current.forEach((el, i) => { if (el && el.offsetTop <= mid) cur = i; });
      setActive(cur);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const jump = (id) => {
    const i = SECTIONS.findIndex((s) => s.id === id);
    const el = refs.current[i];
    if (el) window.scrollTo({ top: el.offsetTop - 8, behavior: matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth" });
  };

  return (
    <React.Fragment>
      <div className="progress" style={{ width: progress + "%" }} />
      <DotNav sections={SECTIONS} active={active} onJump={jump} />
      <div className="wrap">
        {SECTIONS.map((s, i) => {
          const Comp = s.Comp;
          return (
            <section key={s.id} data-screen-label={s.label} className={s.hero ? "hero-sec" : ""}
              ref={(el) => (refs.current[i] = el)}>
              <Comp />
            </section>
          );
        })}
        <footer style={{ borderTop: `1px solid var(--line)`, padding: "30px 0 60px", color: "var(--muted)",
          fontFamily: "var(--font-sans)", fontSize: 13 }}>
          Base — Operating Framework · all figures illustrative, to validate in discovery.
        </footer>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
